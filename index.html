<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gantry | Unified Control</title>
    <style>
        :root {
            --primary: #0b5ed7;
            --primary-hover: #0a4eb1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            font-weight: 800;
            color: var(--primary);
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

            .sidebar a {
                padding: 0.75rem 1rem;
                text-decoration: none;
                color: var(--text-light);
                border-radius: 8px;
                font-weight: 500;
                transition: 0.2s;
                cursor: pointer;
            }

                .sidebar a:hover {
                    background: #f1f5f9;
                    color: var(--primary);
                }

                .sidebar a.active {
                    background: var(--primary);
                    color: #fff;
                }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid #cbd5e1; /* Darker, slightly thicker border */
            background-color: #ffffff;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

            /* This makes the box "glow" slightly when clicked */
            input:focus, textarea:focus, select:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(11, 94, 215, 0.1);
                background-color: #fff;
            }
        

        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

            .btn:hover {
                background: var(--primary-hover);
                transform: translateY(-1px);
            }

        .status-msg {
            margin-top: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-align: center;
            min-height: 1.5rem;
        }

        .footer-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

            .footer-link a {
                color: var(--primary);
                text-decoration: none;
                font-weight: 600;
            }
    </style>
</head>
<body>

    <header><div class="brand">GANTRY // COMMAND</div></header>

    <div class="wrapper">
        <aside class="sidebar" id="adminSidebar" style="display:none">
            <a id="nav-driver" class="active">Driver Management</a>
            <a id="nav-status">Status Broadcast</a>
            <div style="flex:1"></div>
            <a id="logout" style="color: var(--error)">Logout</a>
        </aside>

        <main class="main-content">
            <div class="container">
                <section id="view-triage">
                    <div class="card">
                        <h2>Service Intake</h2>
                        <div class="form-group"><label>Name</label><input id="in-triageName"></div>
                        <div class="form-group"><label>Postcode</label><input id="in-triagePost"></div>
                        <div class="form-group"><label>Details</label><textarea id="in-triageMsg" rows="3"></textarea></div>
                        <button id="btn-triage" class="btn">Transmit to Gantry</button>
                        <div id="res-triage" class="status-msg"></div>
                        <div class="footer-link">System Secured | <a id="link-login">Admin Login</a></div>
                    </div>
                </section>

                <section id="view-login" style="display:none">
                    <div class="card">
                        <h2>Admin Access</h2>
                        <div class="form-group"><label>Access Key</label><input id="in-pass" type="password"></div>
                        <button id="btn-login" class="btn">Sign In</button>
                    </div>
                </section>

                <section id="view-driver" style="display:none">
                    <div class="card">
                        <h2>Driver Profile</h2>
                        <div class="form-group"><label>Full Name</label><input id="in-drName"></div>
                        <div class="form-group"><label>Email</label><input id="in-drEmail"></div>
                        <div class="form-group"><label>Mobile</label><input id="in-drMob"></div>
                        <div class="form-group"><label>Slack ID</label><input id="in-drSlack"></div>
                        <div class="form-group"><label>Van ID (e.g. 06)</label><input id="in-drVan"></div>
                        <div class="form-group"><label>Postcode Area</label><input id="in-drPost"></div>
                        <button id="btn-driver" class="btn">Sync to Gantry</button>
                        <div id="res-driver" class="status-msg"></div>
                    </div>
                </section>

                <section id="view-status" style="display:none">
                    <div class="card">
                        <h2>Status Broadcast</h2>
                        <div class="form-group"><label>Van ID (e.g. 06)</label><input id="in-stVan"></div>
                        <div class="form-group"><label>Status Update</label><input id="in-stStatus"></div>
                        <button id="btn-status" class="btn">Broadcast Update</button>
                        <div id="res-status" class="status-msg"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // --- CONFIG ---
        const ADMIN_URL = "https://decimeter-easeful-replica.ngrok-free.dev/webhook-test/fbd452b7-90d9-4e01-941e-230f1c749e57";
        const TRIAGE_URL = "https://decimeter-easeful-replica.ngrok-free.dev/webhook-test/2b5d00f6-a6f0-41e6-a3c2-6249dc8668bb";

        // DEBUG: This must pop up on refresh!
        console.log("System Online");

        // --- UPDATED VIEW CONTROLLER ---
        function show(viewId, linkId) {
            // 1. Toggle Sections
            ['view-triage', 'view-login', 'view-driver', 'view-status'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = (id === viewId) ? 'block' : 'none';
            });

            // 2. Toggle Sidebar Active State
            document.querySelectorAll('.sidebar a').forEach(link => {
                link.classList.remove('active');
            });

            // Only add 'active' if a linkId was provided (skips triage/login views)
            if (linkId) {
                const activeLink = document.getElementById(linkId);
                if (activeLink) activeLink.classList.add('active');
            }
        }

        // Updated Sidebar Listeners
        document.getElementById('nav-driver').onclick = () => show('view-driver', 'nav-driver');
        document.getElementById('nav-status').onclick = () => show('view-status', 'nav-status');

        // Login/Triage Listeners (No sidebar highlights needed here)
        document.getElementById('link-login').onclick = () => show('view-login');
        document.getElementById('btn-login').onclick = () => {
            if (document.getElementById('in-pass').value === 'admin') {
                document.getElementById('adminSidebar').style.display = 'flex';
                show('view-driver', 'nav-driver');
            }
        };

        document.getElementById('link-login').onclick = () => show('view-login');
        document.getElementById('btn-login').onclick = () => {
            if (document.getElementById('in-pass').value === 'admin') {
                document.getElementById('adminSidebar').style.display = 'flex';
                show('view-driver');
            }
        };
        document.getElementById('nav-driver').onclick = () => show('view-driver');
        document.getElementById('nav-status').onclick = () => show('view-status');
        document.getElementById('logout').onclick = () => location.reload();

        // --- API ENGINE ---
        async function api(payload, resId, url) {
            const out = document.getElementById(resId);
            out.textContent = "Connecting...";
            out.style.color = "orange";

            try {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload)
                });
                if (r.ok) {
                    out.textContent = "✓ Gantry Synchronized";
                    out.style.color = "green";
                    document.querySelectorAll('input, textarea').forEach(i => i.value = '');
                } else { throw new Error(); }
            } catch (e) {
                out.textContent = "❌ Connection Failed";
                out.style.color = "red";
            }
        }

        // --- BUTTON MAPPINGS ---

        // 1. Triage
        document.getElementById('btn-triage').onclick = () => {
            api({
                table: 'Triage', data: {
                    Name: document.getElementById('in-triageName').value,
                    Postcode: document.getElementById('in-triagePost').value,
                    Description: document.getElementById('in-triageMsg').value
                }
            }, 'res-triage', TRIAGE_URL);
        };

        // 2. Driver Update (All fields restored)
        document.getElementById('btn-driver').onclick = () => {
            api({
                table: 'Drivers', data: {
                    'Driver Name': document.getElementById('in-drName').value,
                    'Email': document.getElementById('in-drEmail').value,
                    'Mobile': document.getElementById('in-drMob').value,
                    'Slack ID': document.getElementById('in-drSlack').value,
                    'Van ID': 'V-' + document.getElementById('in-drVan').value,
                    'Postcode Area': document.getElementById('in-drPost').value
                }
            }, 'res-driver', ADMIN_URL);
        };

        // 3. Status Broadcast (Table-Aligned)
        document.getElementById('btn-status').onclick = () => {
            api({
                table: 'Drivers', data: {
                    'Van ID': 'V-' + document.getElementById('in-stVan').value,
                    'Status': document.getElementById('in-stStatus').value
                }
            }, 'res-status', ADMIN_URL);
        };

    </script>
</body>
</html>
